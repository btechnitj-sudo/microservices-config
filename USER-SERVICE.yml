server:
  port: 8081                    

spring:
  datasource:                   
    url: jdbc:mysql://localhost:3306/hotel_user   
    username: root              
    password: 1234    

resilience4j:

  circuitbreaker:
    instances:
      userService:
        register-health-indicator: true
        sliding-window-size: 10
        failure-rate-threshold: 50
        minimum-number-of-calls: 5
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 3
        automatic-transition-from-open-to-half-open-enabled: true
  retry:
   instances:
    userService:
     max-attempts: 3
     wait-duration: 2s
  ratelimiter:
   instances:
    userService:
     limit-for-period: 2
     limit-refresh-period: 10s
     timeout-duration: 0s
     
management:
  endpoints:
    web:
      exposure:
        include:  "health,circuitbreakers,circuitbreakerevents,retries,retryevents,ratelimiters,ratelimiterevents"
       
          

  health:
    circuitbreakers:
      enabled: true

  endpoint:
    health:
      show-components: always  
      show-details: always



